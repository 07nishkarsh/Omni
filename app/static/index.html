<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Agent Orchestrator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- VIEW 1: Application Form -->
        <div id="view-form" class="view active">
            <header>
                <h1>Loan Application</h1>
                <p>Submit an application to the Bank Agent Orchestrator</p>
            </header>
            
            <form id="application-form">
                <div class="form-group">
                    <label for="customer_name">Applicant Name</label>
                    <input type="text" id="customer_name" required placeholder="e.g. Vikram Singh">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="loan_type">Loan Type</label>
                        <select id="loan_type" required>
                            <option value="business_expansion">Business Expansion</option>
                            <option value="subsidy_loan">Emergency Agriculture Relief</option>
                            <option value="personal">Personal</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="target_fund">Target Fund</label>
                        <select id="target_fund" required>
                            <option value="General Subsidy Pool">General Subsidy Pool</option>
                            <option value="Central Agriculture Relief Fund">Central Agriculture Relief Fund</option>
                            <option value="Branch Cash Reserve">Branch Cash Reserve</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="requested_amount">Requested Amount (₹)</label>
                        <input type="number" id="requested_amount" required min="1" step="0.01" placeholder="e.g. 40000">
                    </div>
                    
                    <div class="form-group">
                        <label for="annual_declared_income">Annual Declared Income (₹)</label>
                        <input type="number" id="annual_declared_income" required min="1" step="0.01" placeholder="e.g. 15000">
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="is_urgent">
                    <label for="is_urgent">Mark as Urgent / Disaster Relief</label>
                </div>

                <button type="submit" id="submit-btn">Submit Application</button>
            </form>
        </div>

        <!-- VIEW 2: Live Status -->
        <div id="view-status" class="view">
            <header>
                <h1>Transaction Live Status</h1>
                <p id="tx-id-display" class="tx-id">ID: <span></span></p>
            </header>

            <div class="status-container">
                <ul id="status-steps" class="step-list">
                    <!-- Steps will be injected here by JS -->
                </ul>
            </div>
            
            <button id="new-app-btn" class="secondary-btn" style="display: none; margin-top: 20px;">Submit Another Application</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
